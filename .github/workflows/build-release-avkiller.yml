name: Build Release for avkiller

on:
  #push:
  #  tags:
  #    - "v*.*.*"
  workflow_dispatch:
   inputs:
     version:
        description: 'Version for this release'
        type: string
        default: 'v1.5.0'
        required: true
     go-version:
       required: false
       description: "The Go version to use for building the windows backend. The version should be in the format of 'x.y.z'."
       default: "1.26.2"
     make_latest:
        description: 'Mark this release as latest'
        type: boolean
        default: true
        required: true
     release-build:
        required: false
        default: '1'
        description: "Whether to build the windows backend in release mode. If set to '1', the backend will be built in release mode. Otherwise, it will be built in development mode."

  
env:
   TAG_NAME: ${{ inputs.version }}
   VERSION: ${{ inputs.version }}
permissions:
  contents: write


jobs:
  build-windows-pkg:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: get tag
        if: false
        run: |
          if ($env:GITHUB_EVENT_NAME -eq "workflow_dispatch") {
            # 获取所有 Tag（确保包含远程 Tag）
            git fetch --tags
            # 按版本号排序获取最新 Tag（兼容语义化版本）
            $LATEST_TAG = git tag --sort=-v:refname | Select-Object -First 1
            if (-not $LATEST_TAG) { $LATEST_TAG = "nightly" }

            # 去掉 Tag 名称中的 'v' 前缀
            if ($LATEST_TAG.StartsWith("v")) {
                $VERSION = $LATEST_TAG.Substring(1)
            } else {
                  $VERSION = $LATEST_TAG
            }
          } else {
            # 原有逻辑：从推送的 Tag 中提取版本号
            $TAG_VERSION = $env:GITHUB_REF.Split('/')[-1]
            if ($TAG_VERSION.StartsWith("v")) {
                $VERSION = $TAG_VERSION.Substring(1)
              } else {
                  $VERSION = $TAG_VERSION
            }
          }

          # 处理无 Tag 的情况（可选：报错或默认值）
          if ([string]::IsNullOrEmpty($VERSION)) {
            Write-Error "::error::No valid tag found!"
              $VERSION = "0.0.0"
          }

          # 将信息写入环境变量
          "TAG_NAME=$LATEST_TAG" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "VERSION=$VERSION" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24.x'
          
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ inputs.go-version }}
          
      - name: build for windows pkg
        run: |
           .\build.ps1 package -Release -Output ezbookkeeping.zip -NoLint -NoTest
           dir 
        env:
          RELEASE_BUILD: "${{ inputs.release-build }}"

      - name: Publish Release
        uses: softprops/action-gh-release@v1
        with:
          prerelease: false
          draft: true
          name: ${{ env.TAG_NAME }}
          tag_name: ${{ env.TAG_NAME }}
          files: |
            ezbookkeeping.zip
            ezbookkeeping.exe
         
